<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blocked — ForcedFocus</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            font-family: 'Inter', -apple-system, sans-serif;
            color: #e2e8f0;
        }
        .container {
            text-align: center;
            padding: 3rem;
            max-width: 500px;
        }
        .icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #f43f5e, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .domain {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 2rem;
            font-family: monospace;
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            display: inline-block;
        }
        .message {
            font-size: 1rem;
            color: #64748b;
            line-height: 1.6;
        }
        .badge {
            display: inline-block;
            padding: 0.4rem 1rem;
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🛡️</div>
        <h1>Site Blocked</h1>
        <div class="domain" id="blockedDomain">—</div>
        <p class="message">
            This site is blocked by ForcedFocus.<br>
            Stay focused — you've got this! 💪
        </p>
        <div class="badge">⚡ ForcedFocus Active</div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const domain = params.get('domain') || 'this site';
        document.getElementById('blockedDomain').textContent = domain;
        document.title = `Blocked: ${domain} — ForcedFocus`;
    </script>
</body>
</html>
