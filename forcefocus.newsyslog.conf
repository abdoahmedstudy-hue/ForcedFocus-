# ForcedFocus log rotation configuration
# Install to: /etc/newsyslog.d/forcefocus.conf
# Format: logfilename [owner:group] mode count size(KB) when flags [/pid_file] [sig_num]
/var/log/forcefocus.log          root:wheel  640  5  1024  *  J
/var/log/forcefocus_error.log    root:wheel  640  5  1024  *  J
/var/log/forcefocus_web.log      root:wheel  640  5  1024  *  J
/var/log/forcefocus_web_error.log root:wheel 640  5  1024  *  J
