<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ForcedFocus Menu Bar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Transparent body for macOS vibrancy */
        html, body {
            background: transparent !important;
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Remove the background orbs from styles.css */
        body::before, body::after {
            display: none !important;
        }

        .menubar-container {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 100%;
            box-sizing: border-box;
        }

        /* Override card backgrounds to let vibrancy through better */
        .card {
            background: rgba(15, 15, 30, 0.4) !important;
            backdrop-filter: none !important; /* Rely on macOS vibrancy */
            padding: 16px !important;
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin-top: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .duration-grid {
            grid-template-columns: repeat(2, 1fr);
        }
    </style>
</head>
<body>
    <div class="menubar-container" id="appContainer">
        <header class="header">
            <div class="logo">
                <div class="logo-icon" style="font-size: 20px;">⚡</div>
                <div>
                    <h1 style="font-size: 16px; margin:0;">ForcedFocus</h1>
                </div>
            </div>
            <div class="status-badge" id="mbBadge">
                <span class="status-text">Idle</span>
            </div>
        </header>

        <!-- ACTIVE STATE -->
        <div id="activeState" class="hidden" style="display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 12px;">
            <div class="timer-ring" style="width: 160px; height: 160px;">
                <svg viewBox="0 0 200 200">
                    <circle class="timer-bg" cx="100" cy="100" r="90"/>
                    <circle class="timer-progress" id="mbProgress" cx="100" cy="100" r="90"/>
                </svg>
                <div class="timer-inner">
                    <div class="timer-value" id="mbTime" style="font-size: 28px;">00:00:00</div>
                    <div class="timer-label" id="mbLabel">REMAINING</div>
                </div>
            </div>
            <div style="text-align: center;">
                <div id="mbMode" style="font-size: 14px; font-weight: 600;">Blacklist</div>
                <div id="mbExpires" style="font-size: 12px; color: var(--text-secondary);">Expires: 12:00</div>
            </div>
            <button class="btn btn-stop" id="mbBtnStop" style="margin-top: 16px;">
                <span class="btn-icon">🔐</span> Stop
            </button>
        </div>

        <!-- IDLE STATE -->
        <div id="idleState" style="display: flex; flex-direction: column; flex: 1; gap: 12px;">
            
            <div class="card" style="margin: 0;">
                <div class="mode-toggle">
                    <button class="mode-btn active" id="btnModeBlack" data-mode="blacklist" style="padding: 10px;">
                        <span class="mode-icon" style="font-size: 18px;">🚫</span>
                        <span class="mode-name">Blacklist</span>
                    </button>
                    <button class="mode-btn" id="btnModeWhite" data-mode="whitelist" style="padding: 10px;">
                        <span class="mode-icon" style="font-size: 18px;">✅</span>
                        <span class="mode-name">Whitelist</span>
                    </button>
                </div>
            </div>

            <div class="card" style="margin: 0; flex: 1; display: flex; flex-direction: column;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                    <span style="font-weight: 600; font-size: 13px;">Duration</span>
                    <select id="mbDurSelect" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-primary); padding: 4px; border-radius: 8px; outline: none;">
                        <option value="25">25m (Pomo)</option>
                        <option value="30">30 min</option>
                        <option value="60" selected>1 hour</option>
                        <option value="120">2 hours</option>
                    </select>
                </div>
                
                <div class="rescue-box" style="margin-top: auto; padding: 10px; background: rgba(239, 68, 68, 0.05); border: 1px solid rgba(239, 68, 68, 0.2); border-radius: var(--radius-sm);">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <span style="font-size: 12px; font-weight: 600; color: var(--red);">🛡️ Rescue</span>
                        <select id="mbRescueDur" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text-primary); border-radius: 6px; padding: 2px 4px; font-size: 11px; outline: none;">
                            <option value="5">5m</option>
                            <option value="10" selected>10m</option>
                        </select>
                    </div>
                    <button class="btn-rescue" id="mbBtnRescue" style="width: 100%; padding: 8px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; color: var(--red); font-weight: 600; cursor: pointer;">
                        ⚡ Activate
                    </button>
                </div>
            </div>

            <button class="btn btn-start" id="mbBtnStart">
                <span class="btn-icon">▶</span> Start
            </button>
        </div>
    </div>
    
    <script src="menubar.js"></script>
</body>
</html>
