<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Settings — ForcedFocus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="logo">
                <a href="index.html" class="back-btn" title="Back to Dashboard">←</a>
                <div>
                    <h1>Settings</h1>
                    <p class="tagline">Audio Customization</p>
                </div>
            </div>
        </header>

        <main class="dashboard-main" style="max-width: 600px; margin: 0 auto;">
            <section class="card glass">
                <div class="card-header">
                    <h3 style="margin: 0;">🎵 Sound Mapping</h3>
                    <p style="font-size: 13px; color: var(--text-secondary); margin-top: 4px;">
                        Select which audio files play for specific events.
                    </p>
                </div>
                
                <div class="settings-grid" id="settingsGrid">
                    <div class="loading">Fetching audio files...</div>
                </div>

                <div class="upload-section">
                    <label class="upload-label">
                        <span>📤 Upload New Sound (.mp3)</span>
                        <input type="file" id="fileInput" accept="audio/mpeg" hidden>
                        <button class="btn-upload" id="btnTriggerUpload">Choose File</button>
                    </label>
                    <div id="uploadStatus" class="upload-status"></div>
                </div>

                <div class="library-section">
                    <h4>📂 Sound Library</h4>
                    <div class="sound-list" id="soundLibrary">
                        <!-- Dynamically populated -->
                    </div>
                </div>

                <div style="margin-top: 32px; display: flex; gap: 12px;">
                    <button class="btn secondary" id="btnSaveSettings" style="flex: 1;">Save Preferences</button>
                    <a href="index.html" class="btn" style="flex: 1; text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); color: var(--text-primary);">Cancel</a>
                </div>
            </section>
        </main>

        <div class="toast hidden" id="toast"></div>
    </div>

    <script src="settings.js"></script>
</body>
</html>
